[adme]
# Warning: CAO 2026-05-02, the atom gnn makes results much worse. And it's (Expectedly) very slow
# for training. Regardless of the results, disable it if testing other parts of the model.
gnn_atom_enabled = false
gnn_comp_enabled = true
gnn_spacial_enabled = true
mlp_enabled = true

# Increasing layers may or may not improve model performance. It will slow down inference and training.
# We have it lower than idea now to improve speed.

gnn_atom_layers = 1

# Increasing atom comp players appears to have a small, incremental advantage per layer,
# up to a point (2026-05-02)
gnn_comp_layers = 4
# It seems a higher value here, to a point, is relatively cheap, and produces better results. High values increase
# memory use; have crashed with out-of-memory with this at 7.
gnn_spacial_layers = 2
#gnn_spacial_layers = 7
# It seems a higher value here, to a point, is relatively cheap, and produces better results.
mlp_layers = 5

# Covalent bonds
gnn_atom_multiplex_level_0 = true
# Valence angles
gnn_atom_multiplex_level_1 = false
# Proper dihedrals
gnn_atom_multiplex_level_2 = false
# Improper dihedrals
gnn_atom_multiplex_level_3 = false

# AtomGraph analysis features (Non-NN; traditional graph ML.). These feed explicit graph-level descriptors into the
# atom GNN branch and are saved into the trained model config for inference reuse.
atom_graph_analysis_weisfeiler_lehman = false
# Empty list / [] disables graphlet counting. Currently size-3 graphlets are implemented.
atom_graph_analysis_graphlets = [3]
atom_graph_analysis_path_based_methods = false
atom_graph_analysis_local_overlap_statistics = false
atom_graph_analysis_katz_index = false
atom_graph_analysis_lhn_similarity = false
atom_graph_analysis_random_walk_methods = false

# ComponentGraph analysis features. These are graph-level descriptors derived from the
# component/functional-group graph and fed into the component GNN branch.
comp_graph_analysis_weisfeiler_lehman = false
comp_graph_analysis_graphlets = [3]
comp_graph_analysis_path_based_methods = false
comp_graph_analysis_local_overlap_statistics = false
comp_graph_analysis_katz_index = false
comp_graph_analysis_lhn_similarity = false
comp_graph_analysis_random_walk_methods = false

# Spacial/PharmacophoreGraph analysis features. For these analyses we build a sparse
# proximity graph over pharmacophore nodes, even though message passing still uses the
# full distance-weighted pharmacophore graph.
spacial_graph_analysis_weisfeiler_lehman = false
spacial_graph_analysis_graphlets = [3]
spacial_graph_analysis_path_based_methods = false
spacial_graph_analysis_local_overlap_statistics = false
spacial_graph_analysis_katz_index = false
spacial_graph_analysis_lhn_similarity = false
spacial_graph_analysis_random_walk_methods = false

# todo: Eval where this should live. Currently hard-coded.
## Note: Excluding H or not appears not to make any notable difference at first;
## Experiment with this more later.
#exclude_hydrogen = true
